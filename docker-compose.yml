version: "3.8"

services:
  # ── PostgreSQL Database ──────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: campus_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: campus_booking
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d campus_booking"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend API ──────────────────────────────────────
  backend:
    build: ./backend
    container_name: campus_backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_USER: postgres
      DB_HOST: db
      DB_NAME: campus_booking
      DB_PASSWORD: postgres
      DB_PORT: 5432
      JWT_SECRET: supersecretkey_change_in_production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend (Vite Dev Server) ───────────────────────
  frontend:
    build: ./frontend
    container_name: campus_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
